<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaliaAPK HUB - Play Store Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* PlayStore jaisa rounded look */
        .app-card { border-radius: 20px; transition: transform 0.2s; }
        .app-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-white pb-20"> <!-- Bottom padding for mobile nav -->

    <!-- Top Search Bar (Playstore Style) -->
    <header class="sticky top-0 bg-white p-4 shadow-sm z-50">
        <div class="flex items-center bg-gray-100 rounded-full px-4 py-2">
            <i class="fa fa-search text-gray-500 mr-3"></i>
            <input type="text" placeholder="Search for apps & games" class="bg-transparent w-full outline-none text-sm">
        </div>
    </header>

    <!-- Content -->
    <main class="p-4">
        <h2 class="text-xl font-bold text-gray-900 mb-4">Recommended for you</h2>
        
        <!-- App Grid -->
        <div id="app-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            
            <!-- App Card -->
            <div class="app-card border border-gray-100 p-2 shadow-sm">
                <img src="https://via.placeholder.com/150" class="rounded-2xl w-full h-32 object-cover" alt="App">
                <div class="mt-2">
                    <h3 class="font-semibold text-sm truncate">WhatsApp Messenger</h3>
                    <p class="text-xs text-gray-500">Meta Platforms</p>
                    <p class="text-xs text-green-600 font-medium">4.8 ★</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Bottom Navigation (Mobile Playstore Style) -->
    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around p-3 text-gray-500">
        <button class="flex flex-col items-center text-green-600"><i class="fa fa-gamepad"></i><span class="text-[10px]">Games</span></button>
        <button class="flex flex-col items-center"><i class="fa fa-th-large"></i><span class="text-[10px]">Apps</span></button>
        <button class="flex flex-col items-center"><i class="fa fa-bookmark"></i><span class="text-[10px]">Library</span></button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
