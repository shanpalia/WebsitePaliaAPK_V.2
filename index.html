<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaliaAPK HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Horizontal scrollbar hide karne ke liye */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Header -->
    <header class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-extrabold text-green-600">PaliaAPK HUB</h1>
            <button class="text-gray-600 text-xl"><i class="fa fa-search"></i></button>
        </div>
    </header>

    <main class="container mx-auto p-4">
        
        <!-- Banner Slider -->
        <div class="w-full h-40 bg-green-500 rounded-2xl mb-6 flex items-center justify-center text-white font-bold shadow-lg">
            Slider Banner (Ads/Featured)
        </div>

        <!-- Categories (Horizontal Scroll) -->
        <div class="flex space-x-3 overflow-x-auto no-scrollbar mb-6">
            <button class="bg-green-600 text-white px-5 py-2 rounded-full whitespace-nowrap text-sm">All</button>
            <button class="bg-white border border-gray-200 px-5 py-2 rounded-full whitespace-nowrap text-sm">Games</button>
            <button class="bg-white border border-gray-200 px-5 py-2 rounded-full whitespace-nowrap text-sm">Social</button>
            <button class="bg-white border border-gray-200 px-5 py-2 rounded-full whitespace-nowrap text-sm">Tools</button>
            <button class="bg-white border border-gray-200 px-5 py-2 rounded-full whitespace-nowrap text-sm">Photography</button>
        </div>

        <!-- App Grid -->
        <h2 class="text-lg font-bold text-gray-800 mb-4">Trending Apps</h2>
        <div id="app-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            
            <!-- Sample Card -->
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
                <img src="https://via.placeholder.com/100" class="rounded-xl w-full h-24 object-cover mb-2" alt="App">
                <h3 class="font-bold text-sm truncate">App Name</h3>
                <p class="text-xs text-gray-500 mb-2">Category</p>
                <button class="w-full bg-gray-100 text-green-600 py-1 rounded-lg text-xs font-bold hover:bg-green-50">Install</button>
            </div>
            
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
