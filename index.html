        // Merge default categories with Supabase categories, preserving all defaults and displaying app counts (including 0)
        function renderCategories(apps) {
            const container = document.getElementById('categoriesContainer');
            if (!container) return;

            const dbCategories = [...new Set(apps.map(a => a.category).filter(Boolean))];
            
            // Merge defaults with any unique Supabase categories automatically appended
            const mergedCategories = [...defaultCategoriesList];
            dbCategories.forEach(cat => {
                if (!mergedCategories.includes(cat)) {
                    mergedCategories.push(cat);
                }
            });

            container.innerHTML = mergedCategories.map(cat => {
                let count = 0;
                if (cat === 'All') {
                    count = apps.length;
                } else if (cat === 'Featured') {
                    count = apps.filter(a => a.featured || a.is_featured).length;
                } else if (cat === 'Trending') {
                    count = apps.filter(a => parseFloat(a.rating) >= 4.8).length;
                } else if (cat === 'New Apps') {
                    count = apps.filter(a => a.version && a.version.includes('1')).length;
                } else if (cat === 'Recently Updated') {
                    count = apps.filter(a => a.updated_at || (a.version && a.version.includes('2'))).length;
                } else if (cat === 'Top Charts') {
                    count = apps.filter(a => parseFloat(a.rating) >= 4.9).length;
                } else {
                    count = apps.filter(a => a.category === cat).length;
                }

                const iconClass = categoryIcons[cat] || 'fa-folder';
                const isSelected = cat === currentCategory;

                const chipClass = isSelected
                    ? "category-chip bg-mint-600 text-white shadow-md shadow-mint-600/20 px-4 py-2 rounded-full font-bold text-xs whitespace-nowrap flex items-center gap-2 cursor-pointer"
                    : "category-chip bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 px-4 py-2 rounded-full font-semibold text-xs whitespace-nowrap flex items-center gap-2 cursor-pointer border border-gray-200/60 dark:border-gray-700/60";

                return `
                    <button onclick="handleCategoryClick(event, '${cat}')" data-category="${cat}" class="${chipClass}">
                        <i class="fa-solid ${iconClass} text-xs"></i>
                        <span>${cat}</span>
                        <span class="opacity-75 text-[10px]">(${count})</span>
                    </button>
                `;
            }).join('');
        }

        window.handleCategoryClick = function(event, category) {
            const btn = event.currentTarget;
            const circle = document.createElement('span');
            const diameter = Math.max(btn.clientWidth, btn.clientHeight);
            const radius = diameter / 2;
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - btn.getBoundingClientRect().left - radius}px`;
            circle.style.top = `${event.clientY - btn.getBoundingClientRect().top - radius}px`;
            circle.classList.add('ripple');
            
            const existingRipple = btn.getElementsByClassName('ripple')[0];
            if (existingRipple) existingRipple.remove();
            btn.appendChild(circle);

            filterByCategory(category, true);
        };

        window.filterByCategory = function(category, updateUI = true) {
            currentCategory = category;
            
            if (updateUI) {
                document.querySelectorAll('.category-chip').forEach(btn => {
                    const catName = btn.getAttribute('data-category');
                    if (catName === category) {
                        btn.className = "category-chip bg-mint-600 text-white shadow-md shadow-mint-600/20 px-4 py-2 rounded-full font-bold text-xs whitespace-nowrap flex items-center gap-2 cursor-pointer";
                    } else {
                        btn.className = "category-chip bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 px-4 py-2 rounded-full font-semibold text-xs whitespace-nowrap flex items-center gap-2 cursor-pointer border border-gray-200/60 dark:border-gray-700/60";
                    }
                });
            }

            let filtered = [];
            if (category === 'All') {
                filtered = allAppsCache;
            } else if (category === 'Featured') {
                filtered = allAppsCache.filter(a => a.featured || a.is_featured);
            } else if (category === 'Trending') {
                filtered = allAppsCache.filter(a => parseFloat(a.rating) >= 4.8);
            } else if (category === 'New Apps') {
                filtered = allAppsCache.filter(a => a.version && a.version.includes('1'));
            } else if (category === 'Recently Updated') {
                filtered = allAppsCache.filter(a => a.updated_at || (a.version && a.version.includes('2')));
            } else if (category === 'Top Charts') {
                filtered = allAppsCache.filter(a => parseFloat(a.rating) >= 4.9);
            } else {
                filtered = allAppsCache.filter(a => a.category === category);
            }

            document.getElementById('sectionHeading').textContent = category;
            renderAppsGrid(filtered);
        };

        function renderAppsGrid(apps) {
            const container = document.getElementById('appsGrid');
            if (!container) return;

            if (apps.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-16 text-center">
                        <div class="w-16 h-16 bg-mint-50 dark:bg-mint-900/20 text-mint-600 rounded-full flex items-center justify-center mx-auto mb-3 text-xl">
                            <i class="fa-solid fa-box-open"></i>
                        </div>
                        <p class="text-sm font-bold text-gray-700 dark:text-gray-300">No apps available in this category.</p>
                    </div>`;
                return;
            }

            container.innerHTML = apps.map(app => `
                <div class="app-card p-3.5 flex flex-col justify-between">
                    <div>
                        <div class="w-full h-28 bg-gray-50 dark:bg-gray-800 rounded-xl mb-3 p-2 flex items-center justify-center">
                            <img src="${app.icon_url || ''}" alt="${app.name}" class="w-full h-full hero-img-contain rounded-lg">
                        </div>
                        <h5 class="font-bold text-xs text-gray-900 dark:text-white truncate">${app.name}</h5>
                        <p class="text-[10px] text-gray-400 mt-0.5">${app.category || 'App'} • ⭐ ${app.rating || '4.9'}</p>
                    </div>
                    <button onclick="window.location.href='app.html?id=${app.id}'" class="w-full mt-3 bg-mint-50 dark:bg-mint-900/30 text-mint-700 dark:text-mint-400 hover:bg-mint-600 hover:text-white py-2 rounded-xl font-bold text-[11px] transition">Install</button>
                </div>
            `).join('');
        }

        // Firebase Auth State UI
        auth.onAuthStateChanged((user) => {
            const loginBtn = document.getElementById('loginBtn');
            const profileBox = document.getElementById('profileBox');
            const profileAvatar = document.getElementById('profileAvatar');
            if (user) {
                loginBtn?.classList.add('hidden');
                profileBox?.classList.remove('hidden');
                const name = user.displayName || user.email.split('@')[0];
                if (profileAvatar) profileAvatar.textContent = name.substring(0, 2).toUpperCase();
                profileBox.onclick = () => window.location.href = 'dashboard.html';
            } else {
                loginBtn?.classList.remove('hidden');
                profileBox?.classList.add('hidden');
                if (loginBtn) loginBtn.onclick = () => window.location.href = 'user.html';
            }
        });

        document.addEventListener('DOMContentLoaded', initData);
    </script>
</body>
</html>
