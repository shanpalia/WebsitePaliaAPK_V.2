<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaliaAPK HUB - Premium App Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .swiper-slide { border-radius: 24px; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Navbar -->
    <nav class="bg-white p-4 shadow-sm sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-green-600 flex items-center gap-2">
                <div class="bg-green-600 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold">P</div> PaliaAPK HUB
            </h1>
            <div class="bg-gray-100 rounded-full px-4 py-2 w-1/2 flex items-center">
                <i class="fa fa-search text-gray-400"></i>
                <input type="text" placeholder="Search apps, games..." class="bg-transparent ml-2 outline-none w-full text-sm">
            </div>
            <button class="bg-gray-100 p-2 rounded-full w-10 h-10"><i class="fa fa-user"></i></button>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <!-- Slider Section -->
        <div class="swiper mySwiper w-full h-64 my-6">
            <div class="swiper-wrapper">
                <div class="swiper-slide bg-green-500 text-white p-8 flex flex-col justify-end">
                    <h2 class="text-3xl font-bold">Verdant</h2>
                    <p>Mindful moments, beautifully designed.</p>
                </div>
                <div class="swiper-slide bg-blue-500 text-white p-8 flex flex-col justify-end">
                    <h2 class="text-3xl font-bold">Featured App 2</h2>
                    <p>Description of second featured app.</p>
                </div>
            </div>
            <div class="swiper-pagination"></div>
        </div>

        <!-- Categories -->
        <div class="flex space-x-4 overflow-x-auto no-scrollbar py-4">
            <button class="bg-green-600 text-white px-6 py-2 rounded-full font-medium whitespace-nowrap">Games</button>
            <button class="bg-white border px-6 py-2 rounded-full whitespace-nowrap">Social</button>
            <button class="bg-white border px-6 py-2 rounded-full whitespace-nowrap">AI</button>
            <button class="bg-white border px-6 py-2 rounded-full whitespace-nowrap">Tools</button>
            <button class="bg-white border px-6 py-2 rounded-full whitespace-nowrap">Utilities</button>
            <button class="bg-white border px-6 py-2 rounded-full whitespace-nowrap">Education</button>
        </div>

        <!-- Trending Section -->
        <section class="mt-8">
            <h2 class="text-xl font-bold mb-4">Trending Now</h2>
            <div id="app-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <!-- App Card -->
                <div class="bg-white p-4 rounded-2xl shadow-sm border">
                    <div class="w-full h-24 bg-gray-200 rounded-xl mb-3"></div>
                    <h3 class="font-bold text-sm">App Name</h3>
                    <p class="text-xs text-gray-500">Version 1.0</p>
                    <button class="mt-3 w-full bg-green-50 text-green-600 py-2 rounded-lg text-sm font-bold">Install</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-16 py-10">
        <div class="container mx-auto px-6 text-center">
            <h2 class="text-xl font-bold text-green-600 mb-4">PaliaAPK HUB</h2>
            <div class="flex justify-center space-x-6 mb-6">
                <a href="#" class="text-sm text-gray-600">Home</a>
                <a href="#" class="text-sm text-gray-600">Contact Us</a>
                <a href="#" class="text-sm text-gray-600">Feedback</a>
            </div>
            <p class="text-xs text-gray-400">&copy; 2026 PaliaAPK HUB | Developed by ShanPalia</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".mySwiper", { 
            pagination: { el: ".swiper-pagination" }, 
            autoplay: { delay: 3000 }, 
            loop: true 
        });
    </script>
</body>
</html>
