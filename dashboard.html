<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PaliaAPK HUB Admin</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
overflow-x:hidden;
}

/* Sidebar */

.sidebar{

position:fixed;
left:-280px;
top:0;
width:280px;
height:100vh;
background:#ffffff;
box-shadow:0 10px 30px rgba(0,0,0,.08);
transition:.35s;
z-index:1000;

}

.sidebar.active{

left:0;

}

.logo{

padding:28px;
border-bottom:1px solid #eee;

}

.logo h1{

font-size:28px;
font-weight:900;
color:#16a34a;

}

.logo p{

margin-top:5px;
color:#888;

}

.menu{

padding:15px;

}

.menu a{

display:flex;
align-items:center;
gap:14px;

padding:15px 18px;

margin-bottom:8px;

border-radius:14px;

text-decoration:none;

color:#555;

font-weight:700;

transition:.25s;

}

.menu a:hover{

background:#ecfdf5;
color:#16a34a;

}

.menu a i{

width:22px;

}

/* Header */

.header{

height:80px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 30px;

background:#fff;

box-shadow:0 2px 10px rgba(0,0,0,.05);

position:sticky;

top:0;

z-index:900;

}

.left{

display:flex;

align-items:center;

gap:18px;

}

#menuBtn{

width:48px;

height:48px;

border:none;

background:#16a34a;

color:#fff;

border-radius:14px;

font-size:22px;

cursor:pointer;

}

.title h2{

font-size:28px;

font-weight:900;

}

.title p{

color:#777;

margin-top:4px;

}

.right{

display:flex;

align-items:center;

gap:15px;

}

.profile{

width:45px;

height:45px;

background:#16a34a;

color:#fff;

display:flex;

align-items:center;

justify-content:center;

border-radius:50%;

font-weight:bold;

}

/* Main */

.main{

padding:30px;

}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar" id="sidebar">

<div class="logo">

<h1>PaliaAPK HUB</h1>

<p>Admin Dashboard</p>

</div>

<div class="menu">

<a href="dashboard.html">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</a>

<a href="add-app.html">

<i class="fa-solid fa-plus"></i>

Add New App

</a>

<a href="manage-apps.html">

<i class="fa-solid fa-mobile-screen-button"></i>

Manage Apps

</a>

<a href="index.html">

<i class="fa-solid fa-house"></i>

Home

</a>

<a href="#">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</a>

</div>

</div>

<!-- Header -->

<div class="header">

<div class="left">

<button id="menuBtn">

<i class="fa-solid fa-bars"></i>

</button>

<div class="title">

<h2>Dashboard</h2>

<p>Welcome to PaliaAPK HUB Admin</p>

</div>

</div>

<div class="right">

<div class="profile">

SP

</div>

</div>

</div>

<!-- Main -->

<div class="main">

<!-- Cards yaha Part 2 me aayenge -->

</div>

<script>

const sidebar=document.getElementById("sidebar");

const menu=document.getElementById("menuBtn");

menu.onclick=()=>{

sidebar.classList.toggle("active");

}

</script>

</body>
</html>
