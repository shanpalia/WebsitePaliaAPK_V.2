<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaliaAPK HUB - Admin Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{
background:#f3f6fb;
font-family:Arial,sans-serif;
}

.sidebar{
width:250px;
position:fixed;
left:0;
top:0;
bottom:0;
background:#ffffff;
box-shadow:0 0 20px rgba(0,0,0,.08);
}

.sidebar a{
display:flex;
align-items:center;
gap:12px;
padding:16px 22px;
font-weight:700;
color:#555;
transition:.3s;
border-left:4px solid transparent;
}

.sidebar a:hover{
background:#ecfdf5;
color:#16a34a;
border-left:4px solid #16a34a;
}

.main{
margin-left:250px;
padding:30px;
}

.card{
background:#fff;
border-radius:22px;
box-shadow:0 8px 20px rgba(0,0,0,.06);
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="p-6 border-b">

<h1 class="text-3xl font-black text-green-600">

PaliaAPK HUB

</h1>

<p class="text-gray-500">

Admin Dashboard

</p>

</div>

<a href="#" id="dashboardBtn">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</a>

<a href="#" id="addAppBtn">

<i class="fa-solid fa-plus"></i>

Add New App

</a>

<a href="#" id="manageBtn">

<i class="fa-solid fa-mobile-screen-button"></i>

Manage Apps

</a>

<a href="index.html">

<i class="fa-solid fa-house"></i>

Home

</a>

<a href="#" id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</a>

</div>

<!-- Main -->

<div class="main">

<h1 class="text-4xl font-black">

Dashboard

</h1>

<p class="text-gray-500 mt-2">

Welcome to PaliaAPK HUB Admin Panel

</p>

<!-- Cards -->

<div class="grid grid-cols-4 gap-6 mt-8">

<div class="card p-6">

<p class="text-gray-500">

Total Apps

</p>

<h2
id="totalApps"
class="text-5xl font-black mt-3 text-green-600">

0

</h2>

</div>

<div class="card p-6">

<p class="text-gray-500">

Total Downloads

</p>

<h2
id="totalDownloads"
class="text-5xl font-black mt-3 text-blue-600">

0

</h2>

</div>

<div class="card p-6">

<p class="text-gray-500">

Total Users

</p>

<h2
id="totalUsers"
class="text-5xl font-black mt-3 text-purple-600">

0

</h2>

</div>

<div class="card p-6">

<p class="text-gray-500">

Total Site Visits

</p>

<h2
id="totalVisits"
class="text-5xl font-black mt-3 text-orange-500">

0

</h2>

</div>

</div>

<!-- Content -->

<!-- Content Area -->

<div id="contentArea" class="grid grid-cols-12 gap-6 mt-8">

    <!-- LEFT SIDE -->

    <div class="col-span-8">

        <div class="card p-6">

            <h2 class="text-2xl font-black mb-6">

                ➕ Add New App

            </h2>

            <div class="grid grid-cols-2 gap-5">

                <div>

                    <label class="font-bold">

                        App Name

                    </label>

                    <input id="appName"
                    class="w-full border rounded-xl p-3 mt-2"
                    type="text">

                </div>

                <div>

                    <label class="font-bold">

                        Version

                    </label>

                    <input id="version"
                    class="w-full border rounded-xl p-3 mt-2"
                    type="text">

                </div>

                <div>

                    <label class="font-bold">

                        Developer

                    </label>

                    <input id="developer"
                    class="w-full border rounded-xl p-3 mt-2"
                    type="text">

                </div>

                <div>

                    <label class="font-bold">

                        Package Name

                    </label>

                    <input id="package"
                    class="w-full border rounded-xl p-3 mt-2"
                    type="text">

                </div>

                <div>

                    <label class="font-bold">

                        Android Version

                    </label>

                    <input id="android"
                    class="w-full border rounded-xl p-3 mt-2"
                    type="text">

                </div>

                <div>

                    <label class="font-bold">

                        Category

                    </label>

                    <select id="category"
                    class="w-full border rounded-xl p-3 mt-2">

                        <option>Social</option>

                        <option>AI</option>

                        <option>Tools</option>

                        <option>Games</option>

                        <option>Health</option>

                    </select>

                </div>

            </div>

            <div class="mt-6">

                <label class="font-bold">

                    Description

                </label>

                <textarea
                id="description"
                rows="5"
                class="w-full border rounded-xl p-3 mt-2"></textarea>

            </div>

            <div class="grid grid-cols-2 gap-5 mt-6">

                <div>

                    <label class="font-bold">

                        App Icon

                    </label>

                    <input id="icon"
                    type="file">

                </div>

                <div>

                    <label class="font-bold">

                        APK File

                    </label>

                    <input id="apk"
                    type="file">

                </div>

                <div>

                    <label class="font-bold">

                        Banner

                    </label>

                    <input id="banner"
                    type="file">

                </div>

                <div>

                    <label class="font-bold">

                        Screenshots (5)

                    </label>

                    <input id="screens"
                    type="file"
                    multiple>

                </div>

            </div>

            <div class="flex gap-4 mt-8">

                <button
                class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">

                    ✨ AI Description

                </button>

                <button
                class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold">

                    Publish App

                </button>

            </div>

        </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="col-span-4">

        <div class="card p-6">

            <h2 class="text-xl font-black mb-5">

                📱 Live Preview

            </h2>

            <div class="rounded-[35px] border-[12px] border-black overflow-hidden bg-white">

                <img
                id="previewBanner"
                src="https://placehold.co/300x180"
                class="w-full h-44 object-cover">

                <div class="p-5">

                    <img
                    id="previewIcon"
                    src="https://placehold.co/90"
                    class="w-20 h-20 rounded-3xl border-4 border-white shadow-xl -mt-14 bg-white">

                    <h2
                    id="previewName"
                    class="font-black text-2xl mt-4">

                        App Name

                    </h2>

                    <p
                    id="previewDeveloper"
                    class="text-gray-500">

                        Developer

                    </p>

                    <p
                    id="previewDescription"
                    class="text-sm mt-4 text-gray-600">

                        App Description...

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

</div>

</body>
</html>
