<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaliaAPK HUB - Admin Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f4f7fb}
.sidebar{
 position:fixed;top:0;left:-280px;width:280px;height:100vh;
 background:#fff;box-shadow:0 10px 30px rgba(0,0,0,.15);
 transition:left .3s;z-index:1000
}
.sidebar.active{left:0}
.logo{
 position:relative;
 padding:24px;
 border-bottom:1px solid #eee;
}
.logo h1{font-size:30px;color:#16a34a;font-weight:800}
.logo p{color:#777;margin-top:5px}
.close-btn{
 position:absolute;
 top:18px;
 right:18px;
 width:42px;
 height:42px;
 border:none;
 border-radius:12px;
 background:#16a34a;
 color:#fff;
 font-size:20px;
 cursor:pointer;
 display:none;
}
.sidebar.active .close-btn{display:block}
.menu a{
 display:flex;
 align-items:center;
 gap:12px;
 padding:16px 22px;
 text-decoration:none;
 color:#444;
 font-weight:700;
}
.menu a:hover{background:#ecfdf5;color:#16a34a}
.header{
 height:80px;
 background:#fff;
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:0 24px;
 box-shadow:0 2px 10px rgba(0,0,0,.05)
}
.left{display:flex;align-items:center;gap:16px}
#menuBtn{
 width:48px;height:48px;
 border:none;
 border-radius:12px;
 background:#16a34a;
 color:#fff;
 cursor:pointer;
 font-size:22px;
}
.profile{
 width:44px;height:44px;border-radius:50%;
 background:#16a34a;color:#fff;
 display:flex;align-items:center;justify-content:center;
 font-weight:bold;
}
.main{padding:30px}
.cards{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
 gap:20px;
}
.card{
 background:#fff;
 border-radius:18px;
 padding:22px;
 box-shadow:0 8px 20px rgba(0,0,0,.08)
}
.card h3{color:#777}
.card h2{font-size:40px;margin-top:10px}

/* App List Table Styling */
.table-container{
 margin-top:30px;
 background:#fff;
 border-radius:18px;
 padding:22px;
 box-shadow:0 8px 20px rgba(0,0,0,.08);
 overflow-x:auto;
}
table{
 width:100%;
 border-collapse:collapse;
 text-align:left;
}
th, td{
 padding:14px 16px;
 border-bottom:1px solid #eee;
}
th{
 color:#777;
 font-weight:700;
 font-size:14px;
}
td{
 color:#333;
 font-size:15px;
}
.action-btns{
 display:flex;
 gap:10px;
 justify-content:flex-end;
}
.btn-edit{
 background:#3b82f6;
 color:#fff;
 padding:6px 12px;
 border-radius:8px;
 text-decoration:none;
 font-size:13px;
 font-weight:600;
 border:none;
 cursor:pointer;
}
.btn-delete{
 background:#ef4444;
 color:#fff;
 padding:6px 12px;
 border-radius:8px;
 text-decoration:none;
 font-size:13px;
 font-weight:600;
 border:none;
 cursor:pointer;
}
.btn-edit:hover{background:#2563eb}
.btn-delete:hover{background:#dc2626}

#overlay{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.35);
 display:none;
 z-index:999;
}
</style>
</head>
<body>

<div id="overlay"></div>

<div class="sidebar" id="sidebar">
<div class="logo">
<button id="closeSidebar" class="close-btn">
<i class="fa-solid fa-xmark"></i>
</button>
<h1>PaliaAPK HUB</h1>
<p>Admin Dashboard</p>
</div>

<div class="menu">
<a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
<a href="add-app.html"><i class="fa-solid fa-plus"></i> Add New App</a>
<a href="manage-app.html"><i class="fa-solid fa-mobile-screen-button"></i> Manage Apps</a>
<a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
<a href="#" id="logoutBtn">
    <i class="fa-solid fa-right-from-bracket"></i>
    Logout
</a>
</div>
</div>

<header class="header">
<div class="left">
<button id="menuBtn"><i class="fa-solid fa-bars"></i></button>
<div>
<h2 style="font-size:28px;font-weight:800">Dashboard</h2>
<p style="color:#777">Welcome to PaliaAPK HUB Admin</p>
</div>
</div>
<div class="profile">SP</div>
</header>

<main class="main">
<!-- Cards Section -->
<div class="cards">
<div class="card"><h3>Total Apps</h3><h2 id="totalApps">0</h2></div>
<div class="card"><h3>Total Downloads</h3><h2 id="totalDownloads">0</h2></div>
<div class="card"><h3>Total Users</h3><h2 id="totalUsers">0</h2></div>
<div class="card"><h3>Total Site Visits</h3><h2 id="totalSiteVisits">0</h2></div>
</div>

<!-- App List Section -->
<div class="table-container">
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
<h3 style="font-size:20px; font-weight:800; color:#333;">Manage Apps</h3>
<a href="add-app.html" style="background:#16a34a; color:#fff; padding:8px 16px; border-radius:10px; text-decoration:none; font-weight:600; font-size:14px;"><i class="fa-solid fa-plus"></i> Add App</a>
</div>
<table>
<thead>
<tr>
<th>App Name</th>
<th>Version</th>
<th>Category</th>
<th style="text-align:right;">Actions</th>
</tr>
</thead>
<tbody id="appTableBody">
<!-- Supabase से Apps यहाँ लाइव लोड होंगी -->
<tr>
<td colspan="4" style="text-align:center; color:#777;">Loading apps...</td>
</tr>
</tbody>
</table>
</div>
</main>

<script>
 // ===== Admin Session Check =====
if (sessionStorage.getItem("adminLoggedIn") !== "true") {

    alert("Access Denied!");

    window.location.href = "admin.html";

}
// --- SUPABASE CONFIGURATION ---
const SUPABASE_URL = 'https://ralinnuegsbuvlhwpzln.supabase.co'; // यहाँ अपनी Supabase URL डालें
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhbGlubnVlZ3NidXZsaHdwemxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTU2NDIsImV4cCI6MjA5NTg3MTY0Mn0.hIec6UxRx5gzSMTi5oJ3_xXw3d1QKCmKsPF-stBwIFE'; // यहाँ अपनी Supabase Anon/Public Key डालें

const { createClient } = supabase;
const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Sidebar Functionality
const sidebar = document.getElementById("sidebar");
const menuBtn = document.getElementById("menuBtn");
const closeBtn = document.getElementById("closeSidebar");
const overlay = document.getElementById("overlay");

function openSidebar(){
 sidebar.classList.add("active");
 overlay.style.display="block";
}

function closeSidebar(){
 sidebar.classList.remove("active");
 overlay.style.display="none";
}

menuBtn.addEventListener("click", openSidebar);
closeBtn.addEventListener("click", closeSidebar);
overlay.addEventListener("click", closeSidebar);

document.querySelectorAll(".menu a").forEach(a=>{
 a.addEventListener("click", closeSidebar);
});

// --- FETCH DATA & APPS FROM SUPABASE ---
async function fetchDashboardData() {
 try {
  // 1. Fetch Total Apps Count & App List from 'apps' table
  const { data: apps, count, error } = await _supabase
    .from('apps')
    .select('*', { count: 'exact' });

  if (error) throw error;

  // Update Total Apps Card
  if (count !== null) {
    document.getElementById("totalApps").innerText = count;
  }

  // Populate App Table List
  const tableBody = document.getElementById("appTableBody");
  tableBody.innerHTML = "";

  if (!apps || apps.length === 0) {
    tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#777;">No apps found.</td></tr>`;
    return;
  }

  apps.forEach(app => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td style="font-weight:600;">${app.name || app.title || 'N/A'}</td>
      <td>${app.version || 'N/A'}</td>
      <td>${app.category || 'N/A'}</td>
      <td>
        <div class="action-btns">
          <button onclick="editApp('${app.id}')" class="btn-edit"><i class="fa-solid fa-pen-to-square"></i> Edit</button>
          <button onclick="deleteApp('${app.id}')" class="btn-delete"><i class="fa-solid fa-trash"></i> Delete</button>
        </div>
      </td>
    `;
    tableBody.appendChild(row);
  });

 } catch (err) {
  console.error("Error loading dashboard data:", err.message);
  document.getElementById("appTableBody").innerHTML = `<tr><td colspan="4" style="text-align:center; color:red;">Failed to load apps. Check console.</td></tr>`;
 }
}

// Edit App Function (Redirects to add-app page or opens edit modal with ID)
function editApp(id) {
 // आप चाहें तो इसे अपने add-app.html पर भेज सकते हैं या एडिट पेज पर (जैसे: add-app.html?id=...)
 window.location.href = `add-app.html?id=${id}`;
}

// Delete App Function
async function deleteApp(id) {
 if (confirm("Are you sure you want to delete this app?")) {
  try {
    const { error } = await _supabase
      .from('apps')
      .delete()
      .eq('id', id);

    if (error) throw error;

    alert("App deleted successfully!");
    fetchDashboardData(); // लिस्ट को दोबारा रिफ्रेश करें
  } catch (err) {
    alert("Error deleting app: " + err.message);
  }
 }
}

// पेज लोड होने पर डेटा फेच करें
window.addEventListener("DOMContentLoaded", fetchDashboardData);
 // ===== Logout =====

document.getElementById("logoutBtn").addEventListener("click", async (e) => {

    e.preventDefault();

    sessionStorage.removeItem("adminLoggedIn");

    alert("Logged out successfully.");

    window.location.replace("admin.html");

});
</script>

</body>
</html>
