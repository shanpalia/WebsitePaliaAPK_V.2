<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PaliaAPK HUB Admin Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{
background:#f5f7fb;
font-family:Arial,sans-serif;
}

.card{
background:#fff;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

</style>

</head>

<body>

<div class="max-w-7xl mx-auto p-6">

<!-- HEADER -->

<div class="card p-6 flex items-center justify-between">

<div>

<h1 class="text-4xl font-black text-green-600">

PaliaAPK HUB

</h1>

<p class="text-gray-500">

Admin Dashboard

</p>

</div>

<div class="flex gap-4">

<button
id="homeBtn"
class="bg-gray-900 text-white px-6 py-3 rounded-xl font-bold">

<i class="fa-solid fa-house"></i>

Home

</button>

<button
id="logoutBtn"
class="bg-red-600 text-white px-6 py-3 rounded-xl font-bold">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</button>

</div>

</div>

<!-- DASHBOARD CARDS -->

<div class="grid grid-cols-2 gap-6 mt-8">

<div class="card p-8">

<p class="text-gray-500">

Total Apps

</p>

<h2
id="totalApps"
class="text-5xl font-black mt-3">

0

</h2>

</div>

<div class="card p-8">

<p class="text-gray-500">

Total Downloads

</p>

<h2
id="totalDownloads"
class="text-5xl font-black mt-3">

0

</h2>

</div>

</div>

<!-- ACTION BUTTONS -->

<div class="flex gap-4 mt-8">

<button
id="addAppBtn"
class="bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-2xl font-bold">

<i class="fa-solid fa-plus"></i>

Add New App

</button>

</div>

<!-- MANAGE APPS -->

<div class="card mt-8 overflow-hidden">

<div class="p-6 border-b">

<h2 class="text-2xl font-black">

Manage Apps

</h2>

</div>

<table class="w-full">

<thead class="bg-gray-100">

<tr>

<th class="p-4">Icon</th>

<th class="p-4">App Name</th>

<th class="p-4">Version</th>

<th class="p-4">Action</th>

</tr>

</thead>

<tbody id="app-list">

<tr>

<td colspan="4" class="text-center p-12 text-gray-400">

No Apps Found

</td>

</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
