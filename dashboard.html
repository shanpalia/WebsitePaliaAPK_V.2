<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaliaAPK HUB - Admin Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{
background:#f3f6fb;
font-family:Arial,sans-serif;
}

.sidebar{
width:250px;
position:fixed;
left:0;
top:0;
bottom:0;
background:#ffffff;
box-shadow:0 0 20px rgba(0,0,0,.08);
}

.sidebar a{
display:flex;
align-items:center;
gap:12px;
padding:16px 22px;
font-weight:700;
color:#555;
transition:.3s;
border-left:4px solid transparent;
}

.sidebar a:hover{
background:#ecfdf5;
color:#16a34a;
border-left:4px solid #16a34a;
}

.main{
margin-left:250px;
padding:30px;
}

.card{
background:#fff;
border-radius:22px;
box-shadow:0 8px 20px rgba(0,0,0,.06);
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="p-6 border-b">

<h1 class="text-3xl font-black text-green-600">

PaliaAPK HUB

</h1>

<p class="text-gray-500">

Admin Dashboard

</p>

</div>

<a href="#" id="dashboardBtn">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</a>

<a href="#" id="addAppBtn">

<i class="fa-solid fa-plus"></i>

Add New App

</a>

<a href="#" id="manageBtn">

<i class="fa-solid fa-mobile-screen-button"></i>

Manage Apps

</a>

<a href="index.html">

<i class="fa-solid fa-house"></i>

Home

</a>

<a href="#" id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</a>

</div>

<!-- Main -->

<div class="main">

<h1 class="text-4xl font-black">

Dashboard

</h1>

<p class="text-gray-500 mt-2">

Welcome to PaliaAPK HUB Admin Panel

</p>

<!-- Cards -->

<div class="grid grid-cols-4 gap-6 mt-8">

<div class="card p-6">

<p class="text-gray-500">

Total Apps

</p>

<h2
id="totalApps"
class="text-5xl font-black mt-3 text-green-600">

0

</h2>

</div>

<div class="card p-6">

<p class="text-gray-500">

Total Downloads

</p>

<h2
id="totalDownloads"
class="text-5xl font-black mt-3 text-blue-600">

0

</h2>

</div>

<div class="card p-6">

<p class="text-gray-500">

Total Users

</p>

<h2
id="totalUsers"
class="text-5xl font-black mt-3 text-purple-600">

0

</h2>

</div>

<div class="card p-6">

<p class="text-gray-500">

Total Site Visits

</p>

<h2
id="totalVisits"
class="text-5xl font-black mt-3 text-orange-500">

0

</h2>

</div>

</div>

<!-- Content -->

<div
id="contentArea"
class="card mt-8 p-8">

<h2 class="text-2xl font-black">

Dashboard Ready

</h2>

<p class="text-gray-500 mt-3">

Next step me yahin Add App Form aur Manage Apps Table aayega.

</p>

</div>

</div>

</body>
</html>
