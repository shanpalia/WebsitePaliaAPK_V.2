<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaliaAPK HUB - Admin Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f4f7fb}
.sidebar{
 position:fixed;top:0;left:-280px;width:280px;height:100vh;
 background:#fff;box-shadow:0 10px 30px rgba(0,0,0,.15);
 transition:left .3s;z-index:1000
}
.sidebar.active{left:0}
.logo{
 position:relative;
 padding:24px;
 border-bottom:1px solid #eee;
}
.logo h1{font-size:30px;color:#16a34a;font-weight:800}
.logo p{color:#777;margin-top:5px}
.close-btn{
 position:absolute;
 top:18px;
 right:18px;
 width:42px;
 height:42px;
 border:none;
 border-radius:12px;
 background:#16a34a;
 color:#fff;
 font-size:20px;
 cursor:pointer;
 display:none;
}
.sidebar.active .close-btn{display:block}
.menu a{
 display:flex;
 align-items:center;
 gap:12px;
 padding:16px 22px;
 text-decoration:none;
 color:#444;
 font-weight:700;
}
.menu a:hover{background:#ecfdf5;color:#16a34a}
.header{
 height:80px;
 background:#fff;
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:0 24px;
 box-shadow:0 2px 10px rgba(0,0,0,.05)
}
.left{display:flex;align-items:center;gap:16px}
#menuBtn{
 width:48px;height:48px;
 border:none;
 border-radius:12px;
 background:#16a34a;
 color:#fff;
 cursor:pointer;
 font-size:22px;
}
.profile{
 width:44px;height:44px;border-radius:50%;
 background:#16a34a;color:#fff;
 display:flex;align-items:center;justify-content:center;
 font-weight:bold;
}
.main{padding:30px}
.cards{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
 gap:20px;
}
.card{
 background:#fff;
 border-radius:18px;
 padding:22px;
 box-shadow:0 8px 20px rgba(0,0,0,.08)
}
.card h3{color:#777}
.card h2{font-size:40px;margin-top:10px}
#overlay{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.35);
 display:none;
 z-index:999;
}
</style>
</head>
<body>

<div id="overlay"></div>

<div class="sidebar" id="sidebar">

<div class="logo">
<button id="closeSidebar" class="close-btn">
<i class="fa-solid fa-xmark"></i>
</button>
<h1>PaliaAPK HUB</h1>
<p>Admin Dashboard</p>
</div>

<div class="menu">
<a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
<a href="add-app.html"><i class="fa-solid fa-plus"></i> Add New App</a>
<a href="manage-apps.html"><i class="fa-solid fa-mobile-screen-button"></i> Manage Apps</a>
<a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
<a href="#"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
</div>

</div>

<header class="header">
<div class="left">
<button id="menuBtn"><i class="fa-solid fa-bars"></i></button>
<div>
<h2 style="font-size:28px;font-weight:800">Dashboard</h2>
<p style="color:#777">Welcome to PaliaAPK HUB Admin</p>
</div>
</div>
<div class="profile">SP</div>
</header>

<main class="main">
<div class="cards">
<div class="card"><h3>Total Apps</h3><h2>0</h2></div>
<div class="card"><h3>Total Downloads</h3><h2>0</h2></div>
<div class="card"><h3>Total Users</h3><h2>0</h2></div>
<div class="card"><h3>Total Site Visits</h3><h2>0</h2></div>
</div>
<!-- All Apps -->

<div class="mt-10 bg-white rounded-2xl shadow-lg p-6">

<div class="flex justify-between items-center mb-6">

<h2 class="text-2xl font-bold">
All Apps
</h2>

<input
type="text"
id="searchApp"
placeholder="Search App..."
class="border rounded-xl px-4 py-2 w-72">

</div>

<div class="overflow-x-auto">

<table class="w-full">

<thead class="bg-gray-100">

<tr>

<th class="p-4">Icon</th>

<th class="p-4">App Name</th>

<th class="p-4">Version</th>

<th class="p-4">Category</th>

<th class="p-4">Date</th>

<th class="p-4">Downloads</th>

<th class="p-4">Actions</th>

</tr>

</thead>

<tbody id="appsTable">

<tr>

<td colspan="7" class="text-center p-8 text-gray-500">

Loading Apps...

</td>

</tr>

</tbody>

</table>

</div>

</div>
</main>

<script>
const sidebar=document.getElementById("sidebar");
const menuBtn=document.getElementById("menuBtn");
const closeBtn=document.getElementById("closeSidebar");
const overlay=document.getElementById("overlay");

function openSidebar(){
 sidebar.classList.add("active");
 overlay.style.display="block";
}

function closeSidebar(){
 sidebar.classList.remove("active");
 overlay.style.display="none";
}

menuBtn.addEventListener("click",openSidebar);
closeBtn.addEventListener("click",closeSidebar);
overlay.addEventListener("click",closeSidebar);

document.querySelectorAll(".menu a").forEach(a=>{
 a.addEventListener("click",closeSidebar);
});
</script>

</body>
</html>
