<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit App - PaliaAPK HUB</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <header class="flex justify-between items-center mb-8 pb-4 border-b border-gray-800">
            <h1 class="text-2xl font-bold text-yellow-400">PaliaAPK HUB - Edit Application</h1>
            <a href="index.html" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-4 py-2 rounded-lg text-sm transition">Back to Dashboard</a>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Form Section -->
            <div class="lg:col-span-2 bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h2 class="text-xl font-semibold mb-6 text-white">Update App Details & Files</h2>
                
                <form id="editAppForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-1">App Name</label>
                            <input type="text" id="appName" name="app_name" required class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-1">Version</label>
                            <input type="text" id="appVersion" name="version" required class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-500">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-1">Developer</label>
                            <input type="text" id="appDeveloper" name="developer" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-1">Category</label>
                            <input type="text" id="appCategory" name="category" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-500">
                        </div>
                    </div>

                    <!-- App Icon URL / File Field -->
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">App Icon URL</label>
                        <input type="url" id="appIcon" name="icon_url" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-500" placeholder="https://example.com/icon.png">
                    </div>

                    <!-- APK File URL Field -->
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">APK File URL</label>
                        <input type="url" id="appUrl" name="apk_url" required class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-500" placeholder="https://example.com/app.apk">
                    </div>

                    <!-- Screenshots URLs Field -->
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Screenshots URLs (Comma separated)</label>
                        <textarea id="appScreenshots" name="screenshots" rows="2" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-500" placeholder="https://img1.com, https://img2.com"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Description</label>
                        <textarea id="appDescription" name="description" rows="4" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-500"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-semibold py-3 rounded-lg transition">Update Application</button>
                </form>
            </div>

            <!-- Live Preview Section -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 flex flex-col items-center">
                <h3 class="text-lg font-medium text-gray-300 mb-4">Live Preview</h3>
                <div class="w-64 h-[500px] bg-black border-4 border-gray-700 rounded-3xl p-4 flex flex-col justify-between shadow-xl">
                    <div class="text-center">
                        <div class="w-16 h-16 bg-gray-700 mx-auto rounded-xl mb-3 flex items-center justify-center overflow-hidden">
                            <span id="previewIconText" class="text-xs text-gray-400">Icon</span>
                            <img id="previewIconImg" src="" class="w-full h-full object-cover hidden" alt="">
                        </div>
                        <h4 id="previewName" class="font-bold text-white text-base truncate">App Name</h4>
                        <p id="previewDev" class="text-xs text-gray-400 truncate">Developer</p>
                    </div>
                    <div class="bg-gray-900 p-3 rounded-xl text-xs text-gray-300 space-y-1">
                        <p><strong>Version:</strong> <span id="previewVersion">1.0.0</span></p>
                        <p><strong>Category:</strong> <span id="previewCategory">Category</span></p>
                    </div>
                    <div class="text-center">
                        <span class="inline-block bg-yellow-600 text-white text-xs px-4 py-2 rounded-full font-medium w-full">Download APK</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase Initialization (Apni credentials yahan dalein)
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const appId = urlParams.get('id');

        // Form Elements Mapping
        const nameInput = document.getElementById('appName');
        const devInput = document.getElementById('appDeveloper');
        const verInput = document.getElementById('appVersion');
        const catInput = document.getElementById('appCategory');
        const iconInput = document.getElementById('appIcon');
        const urlInput = document.getElementById('appUrl');
        const screenshotsInput = document.getElementById('appScreenshots');
        const descInput = document.getElementById('appDescription');

        function updatePreview() {
            document.getElementById('previewName').innerText = nameInput.value || 'App Name';
            document.getElementById('previewDev').innerText = devInput.value || 'Developer';
            document.getElementById('previewVersion').innerText = verInput.value || '1.0.0';
            document.getElementById('previewCategory').innerText = catInput.value || 'Category';
            
            const img = document.getElementById('previewIconImg');
            const txt = document.getElementById('previewIconText');
            if(iconInput.value) {
                img.src = iconInput.value;
                img.classList.remove('hidden');
                txt.classList.add('hidden');
            } else {
                img.classList.add('hidden');
                txt.classList.remove('hidden');
            }
        }

        [nameInput, devInput, verInput, catInput, iconInput].forEach(input => {
            input.addEventListener('input', updatePreview);
        });

        // Fetch Existing App Data for Auto-Population based on URL ?id=...
        async function fetchAppData() {
            if (!appId) {
                alert('No App ID found in URL!');
                return;
            }
            const { data, error } = await _supabase.from('apps').select('*').eq('id', appId).single();
            if (error) {
                console.error('Error fetching app data:', error);
                alert('Failed to load app data.');
                return;
            }
            if (data) {
                nameInput.value = data.app_name || '';
                verInput.value = data.version || '';
                devInput.value = data.developer || '';
                catInput.value = data.category || '';
                iconInput.value = data.icon_url || '';
                urlInput.value = data.apk_url || '';
                screenshotsInput.value = data.screenshots || '';
                descInput.value = data.description || '';
                updatePreview();
            }
        }

        // Handle Form Submit and Update Database Payload
        document.getElementById('editAppForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const updatedData = {
                app_name: nameInput.value,
                version: verInput.value,
                developer: devInput.value,
                category: catInput.value,
                icon_url: iconInput.value,
                apk_url: urlInput.value,
                screenshots: screenshotsInput.value,
                description: descInput.value
            };

            const { error } = await _supabase.from('apps').update(updatedData).eq('id', appId);
            if (error) {
                alert('Error updating app: ' + error.message);
            } else {
                alert('App updated successfully!');
                window.location.href = 'index.html';
            }
        });

        // Initialize Data Fetch on Page Load
        fetchAppData();
    </script>
</body>
</html>
