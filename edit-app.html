<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit App — PaliaAPK HUB</title>
<meta name="description" content="Edit application details in the PaliaAPK HUB catalog.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root{
  --mint-50:  #F3FBF8;
  --mint-100: #E4F5EF;
  --mint-200: #C7EBDD;
  --mint-300: #93DCC2;
  --mint-400: #4FCBA0;
  --mint-500: #22B287;
  --mint-600: #189070;
  --mint-700: #10745A;
  --mint-800: #0B5745;

  --ink-900: #12211D;
  --ink-700: #33473F;
  --ink-500: #5D726A;
  --ink-300: #8FA39C;
  --ink-100: #E4ECE9;

  --white: #FFFFFF;
  --paper: #FAFDFC;
  --line:  #E3EEE9;

  --danger: #E5484D;
  --danger-bg: #FDEDEE;
  --warn: #E8A73B;
  --warn-bg: #FDF4E4;
  --ok: #22B287;
  --ok-bg: #E4F5EF;

  --shadow-sm: 0 1px 2px rgba(18,33,29,0.06), 0 1px 1px rgba(18,33,29,0.04);
  --shadow-md: 0 8px 24px rgba(18,33,29,0.08), 0 2px 6px rgba(18,33,29,0.05);
  --shadow-lg: 0 20px 48px rgba(18,33,29,0.14), 0 4px 12px rgba(18,33,29,0.06);
  --shadow-focus: 0 0 0 3px rgba(34,178,135,0.25);

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-pill: 999px;

  --font-display: 'Sora', ui-sans-serif, system-ui, sans-serif;
  --font-body: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --topbar-h: 68px;
}

body{
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink-900);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

a{ color: inherit; text-decoration: none; }
button{ font-family: inherit; cursor: pointer; }
input, select, textarea{ font-family: inherit; }

/* Back Button Bar */
.back-bar {
  padding: 15px 28px;
  background: var(--white);
  border-bottom: 1px solid var(--line);
}
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background-color: var(--mint-100);
  color: var(--mint-700);
  text-decoration: none;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 13.5px;
  transition: background 0.2s;
}
.btn-back:hover {
  background-color: var(--mint-200);
}

.topbar{
  height: var(--topbar-h);
  background: rgba(250,253,252,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 28px;
  position: sticky;
  top: 0;
  z-index: 40;
}

.topbar-brand{ display: flex; align-items: center; gap: 12px; }
.topbar-brand__mark{
  width: 38px; height: 38px;
  border-radius: 11px;
  background: linear-gradient(155deg, var(--mint-400), var(--mint-700));
  display: flex; align-items: center; justify-content: center;
  color: var(--white);
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 16px;
}

.page-body{ padding: 26px 28px 60px; max-width: 1440px; margin: 0 auto; }

.edit-workspace{
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 24px;
  align-items: start;
}
@media(max-width: 1024px){
  .edit-workspace{ grid-template-columns: 1fr; }
}

.card-box{
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 24px;
  box-shadow: var(--shadow-sm);
}
.card-box h3{
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--ink-900);
}

.form-grid{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.form-group{
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}
.form-group.full{ grid-column: span 2; }
.form-group label{
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ink-700);
}
.form-group input, .form-group select, .form-group textarea{
  padding: 10px 14px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  background: var(--paper);
  color: var(--ink-900);
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus{
  border-color: var(--mint-500);
  background: var(--white);
  outline: none;
}

.btn-primary{
  background: var(--mint-600);
  color: var(--white);
  padding: 12px 20px;
  border: none;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-size: 13.5px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-primary:hover{ background: var(--mint-700); }

/* Live Phone Preview */
.phone-mockup{
  width: 280px;
  height: 540px;
  background: #111;
  border-radius: 36px;
  padding: 12px;
  margin: 0 auto;
  box-shadow: var(--shadow-lg);
  border: 4px solid #333;
}
.phone-screen{
  width: 100%;
  height: 100%;
  background: var(--paper);
  border-radius: 26px;
  overflow-y: auto;
  font-size: 12px;
}
.phone-banner{
  height: 110px;
  background: linear-gradient(135deg, var(--mint-500), var(--mint-700));
}
.phone-content{ padding: 12px; text-align: center; }
.phone-icon{
  width: 52px; height: 52px;
  border-radius: 12px;
  background: var(--white);
  margin: -32px auto 8px;
  box-shadow: var(--shadow-sm);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  border: 2px solid var(--white);
}
.phone-icon img{ width: 100%; height: 100%; object-fit: cover; }
.phone-title{ font-family: var(--font-display); font-weight: 700; font-size: 14px; margin-bottom: 2px; }
.phone-sub{ color: var(--ink-300); font-size: 11px; margin-bottom: 10px; }
.phone-btn{
  background: var(--mint-600); color: white; padding: 8px; border-radius: var(--radius-pill);
  font-weight: 700; font-size: 12px; width: 100%; text-align: center; margin-top: 14px;
}
</style>
</head>
<body>

<!-- BACK BUTTON -->
<div class="back-bar">
    <a href="manage-apps.html" class="btn-back">
        ← Back to Manage Apps
    </a>
</div>

<header class="topbar">
  <div class="topbar-brand">
    <div class="topbar-brand__mark">PA</div>
    <div style="font-family: var(--font-display); font-weight:700; font-size:15px;">PaliaAPK HUB — Edit App</div>
  </div>
</header>

<main class="page-body">
  <div class="edit-workspace">
    <!-- Edit Form Box -->
    <div class="card-box">
      <h3 id="formTitle">Edit Application Details</h3>
      <form id="editAppForm">
        <input type="hidden" id="appId">
        <div class="form-grid">
          <div class="form-group full">
            <label>App Name *</label>
            <input type="text" id="appNameInput" placeholder="e.g. Palia Companion" required>
          </div>
          <div class="form-group">
            <label>Version *</label>
            <input type="text" id="appVersionInput" placeholder="e.g. 2.4.1" required>
          </div>
          <div class="form-group">
            <label>Category *</label>
            <select id="appCategoryInput" required>
              <option value="">Select category</option>
              <option value="Games">Games</option>
              <option value="Tools">Tools</option>
              <option value="Social">Social</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Productivity">Productivity</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Package Name</label>
            <input type="text" id="appPkgInput" placeholder="com.example.app">
          </div>
          <div class="form-group full">
            <label>Icon URL</label>
            <input type="text" id="appIconInput" placeholder="https://...">
          </div>
          <div class="form-group full">
            <label>Description</label>
            <textarea id="appDescInput" rows="3" placeholder="Tell users what this app does"></textarea>
          </div>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Save Changes</button>
      </form>
    </div>

    <!-- Live Phone Preview Box -->
    <div class="card-box" style="text-align:center;">
      <h3>Live Mobile Preview</h3>
      <div class="phone-mockup">
        <div class="phone-screen">
          <div class="phone-banner" id="prevBanner"></div>
          <div class="phone-content">
            <div class="phone-icon" id="prevIconWrap">
              <span id="prevIconPlaceholder" style="font-size:18px; color:var(--mint-700);">+</span>
              <img id="prevIconImg" src="" alt="" style="display:none;">
            </div>
            <div class="phone-title" id="prevTitle">App Name</div>
            <div class="phone-sub" id="prevSub">com.example.app</div>
            <div style="display:flex; justify-content:center; gap:8px; font-size:10px; color:var(--ink-300); margin:8px 0;">
              <span id="prevVersionTag">v1.0.0</span> • <span id="prevCatTag">Category</span>
            </div>
            <div class="phone-btn">Install</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function(){
  var SUPABASE_URL = 'https://ralinnuegsbuvlhwpzln.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhbGlubnVlZ3NidXZsaHdwemxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTU2NDIsImV4cCI6MjA5NTg3MTY0Mn0.hIec6UxRx5gzSMTi5oJ3_xXw3d1QKCmKsPF-stBwIFE';

  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var urlParams = new URLSearchParams(window.location.search);
  var appId = urlParams.get('id');

  var nameInput = document.getElementById('appNameInput');
  var versionInput = document.getElementById('appVersionInput');
  var categoryInput = document.getElementById('appCategoryInput');
  var pkgInput = document.getElementById('appPkgInput');
  var iconInput = document.getElementById('appIconInput');
  var descInput = document.getElementById('appDescInput');

  var prevTitle = document.getElementById('prevTitle');
  var prevSub = document.getElementById('prevSub');
  var prevVersionTag = document.getElementById('prevVersionTag');
  var prevCatTag = document.getElementById('prevCatTag');
  var prevIconImg = document.getElementById('prevIconImg');
  var prevIconPlaceholder = document.getElementById('prevIconPlaceholder');

  function updateLivePreview(){
    prevTitle.textContent = nameInput.value.trim() || 'App Name';
    prevSub.textContent = pkgInput.value.trim() || 'com.example.app';
    prevVersionTag.textContent = 'v' + (versionInput.value.trim() || '1.0.0');
    prevCatTag.textContent = categoryInput.value || 'Category';

    var iconUrl = iconInput.value.trim();
    if(iconUrl){
      prevIconImg.src = iconUrl;
      prevIconImg.style.display = 'block';
      prevIconPlaceholder.style.display = 'none';
    } else {
      prevIconImg.style.display = 'none';
      prevIconPlaceholder.style.display = 'block';
    }
  }

  ['input', 'change'].forEach(function(evt){
    nameInput.addEventListener(evt, updateLivePreview);
    versionInput.addEventListener(evt, updateLivePreview);
    categoryInput.addEventListener(evt, updateLivePreview);
    pkgInput.addEventListener(evt, updateLivePreview);
    iconInput.addEventListener(evt, updateLivePreview);
  });

  if(!appId){
    alert('No App ID specified!');
    window.location.href = 'manage-apps.html';
    return;
  }

  // Fetch app data from Supabase based on ID in URL
  sb.from('apps').select('*').eq('id', appId).single().then(function(res){
    if(res.error || !res.data){
      alert('App not found!');
      window.location.href = 'manage-apps.html';
      return;
    }
    var app = res.data;
    document.getElementById('appId').value = app.id;
    nameInput.value = app.name || '';
    versionInput.value = app.version || '';
    categoryInput.value = app.category || '';
    pkgInput.value = app.package_name || '';
    iconInput.value = app.icon_url || '';
    descInput.value = app.description || '';

    document.getElementById('formTitle').textContent = 'Edit: ' + (app.name || 'App');
    updateLivePreview();
  });

  // Handle Form Update Submission
  document.getElementById('editAppForm').addEventListener('submit', function(e){
    e.preventDefault();

    var updatedData = {
      name: nameInput.value.trim(),
      version: versionInput.value.trim(),
      category: categoryInput.value.trim(),
      package_name: pkgInput.value.trim(),
      icon_url: iconInput.value.trim(),
      description: descInput.value.trim()
    };

    sb.from('apps').update(updatedData).eq('id', appId).then(function(res){
      if(res.error){
        alert('Update failed: ' + res.error.message);
        return;
      }
      alert('App updated successfully!');
      window.location.href = 'manage-apps.html';
    });
  });

})();
</script>
</body>
</html>
